name: cd

on:
  push:
    branches: [main]

jobs:
  package:
    name: Build Dockerized App
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build Docker image
        run: docker build -t webhook-pipeline .

      - name: Validate Docker Compose
        run: docker compose config

      - name: Start postgres
        run: docker compose up -d postgres

      - name: Wait for postgres
        run: sleep 10

      - name: Run migrations
        run: docker compose run --rm api npm run db:migrate

      - name: Start API and worker
        run: docker compose up -d api worker

      - name: Wait for API
        run: sleep 10

      - name: Show container status
        run: docker compose ps

      - name: Show API logs
        run: docker compose logs api

      - name: Show worker logs
        run: docker compose logs worker

      - name: Check API response
        run: curl http://localhost:8080/pipelines

      - name: Show built images
        run: docker images

      - name: Show running containers
        run: docker ps

      - name: Stop containers
        if: always()
        run: docker compose down -v
        